<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSM Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --base: #FCFCFA;
  --surface: #FFFFFF;
  --border: #E8E8E6;
  --text: #171717;
  --text-secondary: #5F5F5F;
  --text-tertiary: #9E9E9E;
  --foundation: #3B3B98;
  --foundation-light: #EEEDF8;
  --foundation-subtle: #F7F6FC;
  --operations: #2D936C;
  --operations-light: #EDF7F2;
  --data: #E76F51;
  --data-light: #FDF0EC;
  --code-bg: #F4F4F3;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --radius: 10px;
  --radius-sm: 6px;
  --radius-xs: 4px;
}
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 15px; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--base);
  color: var(--text);
  line-height: 1.55;
  display: flex;
  min-height: 100vh;
}
.sidebar {
  width: 260px;
  min-width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 24px 0;
  z-index: 10;
}
.sidebar-brand {
  padding: 0 20px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.sidebar-brand h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.sidebar-brand .brand-sub { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.sidebar-section { padding: 0 20px; margin-bottom: 16px; }
.sidebar-section-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-tertiary);
  margin-bottom: 8px;
  padding: 0 4px;
}
.sidebar-nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  margin-bottom: 2px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.12s;
  text-decoration: none;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
}
.sidebar-nav-item:hover { background: var(--code-bg); color: var(--text); }
.sidebar-nav-item.active { background: var(--foundation-light); color: var(--foundation); font-weight: 600; }
.sidebar-nav-item.ops.active { background: var(--operations-light); color: var(--operations); }
.sidebar-nav-item .nav-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0; }
.sidebar-nav-item .nav-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--foundation); flex-shrink: 0;
}
.sidebar-nav-item.ops .nav-dot { background: var(--operations); }

.main {
  flex: 1;
  padding: 28px 32px;
  max-width: 1100px;
  min-width: 0;
}
.main-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.main-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
.main-header .header-date { font-size: 12px; color: var(--text-tertiary); }

.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.card.accent-foundation { border-left: 3px solid var(--foundation); }
.card.accent-operations { border-left: 3px solid var(--operations); }
.card.accent-data { border-left: 3px solid var(--data); }
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.card h3 .card-badge {
  font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 10px;
  letter-spacing: 0.3px;
}
.card-badge.foundation { background: var(--foundation-light); color: var(--foundation); }
.card-badge.operations { background: var(--operations-light); color: var(--operations); }

.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 16px; }
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}
.stat .stat-value { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; font-family: 'JetBrains Mono', monospace; }
.stat .stat-label { font-size: 11px; color: var(--text-tertiary); margin-top: 3px; }
.stat.accent .stat-value { color: var(--foundation); }

.pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
.pulse.ok { background: var(--operations); animation: pulse-anim 2s infinite; }
@keyframes pulse-anim { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: 10.5px; font-weight: 600; white-space: nowrap; letter-spacing: 0.2px;
}
.badge.foundation { background: var(--foundation-light); color: var(--foundation); }
.badge.operations { background: var(--operations-light); color: var(--operations); }
.badge.data { background: var(--data-light); color: var(--data); }
.badge.muted { background: var(--code-bg); color: var(--text-secondary); }

.policy-item {
  padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 6px;
  border-left: 3px solid var(--operations);
}
.policy-item .pi-source { font-size: 10.5px; color: var(--text-tertiary); margin-top: 2px; }
.policy-item a { color: var(--foundation); text-decoration: none; font-size: 12px; font-weight: 500; }
.policy-item a:hover { text-decoration: underline; }

.briefing-day { border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 8px; overflow: hidden; }
.briefing-day .bd-header {
  padding: 10px 14px; background: var(--code-bg); font-size: 13px; font-weight: 600;
  cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  transition: background 0.12s;
}
.briefing-day .bd-header:hover { background: #ECECEA; }
.briefing-day .bd-body { display: none; padding: 14px; font-size: 13px; line-height: 1.65; color: var(--text-secondary); border-top: 1px solid var(--border); }
.briefing-day .bd-body.open { display: block; }
.bd-section { margin-bottom: 10px; }
.bd-section h4 { font-size: 12px; color: var(--foundation); font-weight: 600; margin-bottom: 2px; }
.bd-markets { font-size: 11.5px; color: var(--text-tertiary); padding: 8px 10px; background: var(--code-bg); border-radius: var(--radius-xs); margin-top: 6px; line-height: 1.6; }

.ticker-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 8px; margin-bottom: 16px; }
.ticker-item { padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; box-shadow: var(--shadow-sm); }
.ticker-item .ticker-name { font-size: 10.5px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.ticker-item .ticker-price { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
.ticker-item .ticker-date { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }

.simple-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.simple-table th, .simple-table td { padding: 7px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.simple-table th { font-weight: 600; color: var(--text-tertiary); font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.5px; }

.rule-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 10px; }
.rule-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 16px; cursor: pointer; transition: all 0.15s; box-shadow: var(--shadow-sm);
}
.rule-card:hover { border-color: var(--foundation); box-shadow: var(--shadow-md); }
.rule-card .rc-title { font-size: 13.5px; font-weight: 600; margin-bottom: 4px; }
.rule-card .rc-summary { font-size: 12px; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 8px; }
.rule-card .rc-meta { display: flex; gap: 4px; flex-wrap: wrap; }

.filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.filter-bar .fbtn {
  padding: 4px 10px; border: 1px solid var(--border); border-radius: 14px;
  background: var(--surface); font-size: 11.5px; cursor: pointer; font-family: inherit; color: var(--text-secondary);
  transition: all 0.12s;
}
.filter-bar .fbtn:hover { border-color: var(--foundation); color: var(--foundation); }
.filter-bar .fbtn.active { background: var(--foundation); color: #fff; border-color: var(--foundation); }
.filter-bar .flabel { font-size: 11px; color: var(--text-tertiary); margin-right: 4px; }

.wiki-search {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; font-family: inherit; margin-bottom: 12px; outline: none; background: var(--surface);
}
.wiki-search:focus { border-color: var(--foundation); }
.wiki-group { margin-bottom: 14px; }
.wiki-group h3 { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.wiki-item { padding: 7px 0; border-bottom: 1px solid #F0F0EE; display: flex; align-items: baseline; gap: 8px; font-size: 12.5px; }
.wiki-item:last-child { border-bottom: none; }
.wiki-item .wi-title { font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wiki-item .wi-summary { color: var(--text-tertiary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 2.5; }
.wiki-item .wi-meta { font-size: 10.5px; color: var(--text-tertiary); white-space: nowrap; }

.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border);
  width: 90%; max-width: 680px; max-height: 85vh; overflow-y: auto; padding: 24px; position: relative;
}
.modal-close {
  position: absolute; top: 12px; right: 16px; width: 28px; height: 28px;
  border: 1px solid var(--border); border-radius: 50%; background: var(--surface);
  font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-tertiary);
}
.modal-close:hover { background: var(--code-bg); }
.modal-section { margin-top: 12px; padding: 12px; background: var(--code-bg); border-radius: var(--radius-sm); }
.modal-section h4 { font-size: 12px; font-weight: 600; color: var(--foundation); margin-bottom: 3px; }
.modal-section p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

.arch-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 16px; }
.arch-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px; box-shadow: var(--shadow-sm);
}
.arch-card.foundation { border-top: 3px solid var(--foundation); }
.arch-card.operations { border-top: 3px solid var(--operations); }
.arch-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.2px; }
.arch-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.65; }

.maint-item { padding: 10px 0; border-bottom: 1px solid var(--border); display: flex; gap: 12px; }
.maint-item:last-child { border-bottom: none; }
.maint-item .maint-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; background: var(--data); }
.maint-item .maint-label { font-size: 13px; font-weight: 600; min-width: 130px; }
.maint-item .maint-desc { font-size: 13px; color: var(--text-secondary); }

.flow-row { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
.flow-node { padding: 8px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-sm); }
.flow-arrow { color: var(--text-tertiary); font-size: 16px; }

.empty-state { text-align: center; padding: 28px; color: var(--text-tertiary); font-size: 13px; }
.empty-state .eicon { font-size: 24px; margin-bottom: 6px; opacity: 0.3; }

.overview-hero { margin-bottom: 20px; }
.overview-hero p { font-size: 14px; color: var(--text-secondary); max-width: 600px; line-height: 1.65; }

@media (max-width: 768px) {
  body { flex-direction: column; }
  .sidebar { width: 100%; min-width: 0; height: auto; position: static; flex-direction: row; flex-wrap: wrap; padding: 12px 16px; gap: 8px; }
  .sidebar-brand { display: none; }
  .sidebar-section { padding: 0; margin: 0; display: flex; gap: 4px; flex-wrap: wrap; }
  .sidebar-section-label { display: none; }
  .sidebar-nav-item { width: auto; font-size: 12px; padding: 5px 10px; }
  .main { padding: 16px; }
  .stat-row { grid-template-columns: repeat(2, 1fr); }
  .cards-grid { grid-template-columns: 1fr; }
  .ticker-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <h1>JSM Command</h1>
    <div class="brand-sub">personal agent system v3</div>
  </div>
  <div class="sidebar-section">
    <button class="sidebar-nav-item active" onclick="navigate('overview')" data-nav="overview">
      <span class="nav-icon">&#9679;</span> Overview
    </button>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Foundation</div>
    <button class="sidebar-nav-item" onclick="navigate('architecture')" data-nav="architecture">
      <span class="nav-dot"></span> Architecture
    </button>
    <button class="sidebar-nav-item" onclick="navigate('wiki')" data-nav="wiki">
      <span class="nav-dot"></span> Wiki Browser
    </button>
    <button class="sidebar-nav-item" onclick="navigate('rules')" data-nav="rules">
      <span class="nav-dot"></span> Rules Reference
    </button>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-section-label">Operations</div>
    <button class="sidebar-nav-item ops" onclick="navigate('routines')" data-nav="routines">
      <span class="nav-dot" style="background:var(--operations)"></span> Routines & Briefings
    </button>
    <button class="sidebar-nav-item ops" onclick="navigate('economy')" data-nav="economy">
      <span class="nav-dot" style="background:var(--operations)"></span> Investment
    </button>
    <button class="sidebar-nav-item ops" onclick="navigate('system')" data-nav="system">
      <span class="nav-dot" style="background:var(--operations)"></span> System Health
    </button>
  </div>
</aside>

<main class="main" id="mainContent"></main>

<div class="modal-overlay" id="ruleModalOverlay" onclick="if(event.target===this)closeRuleModal()">
  <div class="modal" id="ruleModal"></div>
</div>

<script>
let currentView = 'overview';
let cachedRules = null;
let cachedWiki = null;
let cachedInvestment = null;
let cachedSoonsal = null;
let cachedPolicy = null;
let cachedHealth = null;
let activeRuleDomain = 'All';
let activeWikiDomain = 'All';

function navigate(view) {
  currentView = view;
  document.querySelectorAll('.sidebar-nav-item').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`[data-nav="${view}"]`);
  if (btn) { btn.classList.add('active'); if (btn.classList.contains('ops')) btn.classList.add('ops'); }
  renderView(view);
}

function renderView(view) {
  const m = document.getElementById('mainContent');
  switch (view) {
    case 'overview': renderOverview(m); break;
    case 'architecture': renderArchitecture(m); break;
    case 'wiki': renderWikiView(m); break;
    case 'rules': renderRulesView(m); break;
    case 'routines': renderRoutinesView(m); break;
    case 'economy': renderEconomyView(m); break;
    case 'system': renderSystemView(m); break;
  }
}

function renderOverview(main) {
  const mk = cachedInvestment?.markets || {};
  let tickers = '';
  if (mk.btc?.price) {
    tickers = `<div class="ticker-grid">
      <div class="ticker-item"><span class="ticker-name">BTC (KRW)</span><span class="ticker-price">${(mk.btc.price/10000).toFixed(0)}<span style="font-size:11px;font-weight:400">만원</span></span><span class="ticker-date">${(mk.btc.date||'').slice(0,10)}</span></div>
      <div class="ticker-item"><span class="ticker-name">S&P 500</span><span class="ticker-price">${mk.sp500?.price?.toLocaleString()||'--'}</span><span class="ticker-date">${(mk.sp500?.date||'').slice(0,10)}</span></div>
      <div class="ticker-item"><span class="ticker-name">KOSPI</span><span class="ticker-price">${mk.kospi?.price?.toLocaleString()||'--'}</span><span class="ticker-date">${(mk.kospi?.date||'').slice(0,10)}</span></div>
      <div class="ticker-item"><span class="ticker-name">NASDAQ</span><span class="ticker-price">${mk.nasdaq?.price?.toLocaleString()||'--'}</span><span class="ticker-date">${(mk.nasdaq?.date||'').slice(0,10)}</span></div>
    </div>`;
  }
  const sd = cachedSoonsal?.length || 0;
  const wp = cachedWiki?.length || 0;
  const rc = cachedRules?.length || 0;
  main.innerHTML = `<div class="main-header"><h2>Overview</h2><span class="header-date">${new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</span></div>
    <div class="overview-hero"><p>Self-built AI agent system. Three axes: <strong style="color:var(--foundation)">Wiki</strong> for long-term knowledge, <strong style="color:var(--operations)">Dashboard</strong> for real-time results, <strong style="color:var(--foundation)">Rules</strong> for agent behavior. Running 12 automated routines across investment, policy scanning, research, and system maintenance.</p></div>
    <div class="stat-row">
      <div class="stat"><div class="stat-value"><span class="pulse ok"></span>Live</div><div class="stat-label">System Status</div></div>
      <div class="stat accent"><div class="stat-value">${wp}</div><div class="stat-label">Wiki Pages</div></div>
      <div class="stat"><div class="stat-value">12</div><div class="stat-label">Active Routines</div></div>
      <div class="stat"><div class="stat-value">${rc}</div><div class="stat-label">Rules</div></div>
    </div>
    <div class="cards-grid">
      <div class="card accent-foundation"><h3>Foundation <span class="card-badge foundation">System</span></h3><p style="font-size:13px;color:var(--text-secondary);line-height:1.65">Architecture defines how the system works. Wiki stores 340+ pages of long-term knowledge. Rules encode 26 behavioral directives for the Coach agent. These are the bones.</p></div>
      <div class="card accent-operations"><h3>Operations <span class="card-badge operations">Runtime</span></h3><p style="font-size:13px;color:var(--text-secondary);line-height:1.65">Routines run on schedule: daily investment briefings, weekly policy scans (gov + Kyung Hee University), prompt journal analysis. Investment tracks portfolio and market data in real-time.</p></div>
    </div>
    ${tickers}
    <div class="card"><h3>Recent Briefings <span class="card-badge muted">${sd} days cached</span></h3><div id="ovBriefings">${renderBriefingPreview()}</div></div>`;
}

function renderBriefingPreview() {
  if (!cachedSoonsal?.length) return '<div class="empty-state"><div class="eicon">--</div>No briefings</div>';
  return cachedSoonsal.slice(0,3).map(d => {
    const ts=Object.keys(d.types), tl={briefing:'Briefing',crypto:'Crypto',cardnews:'Card'};
    const ds=d.date.slice(0,4)+'-'+d.date.slice(4,6)+'-'+d.date.slice(6,8);
    return `<div class="briefing-day"><div class="bd-header" onclick="this.nextElementSibling.classList.toggle('open')"><span>${ds}</span><span style="font-size:11px;color:var(--text-tertiary)">${ts.map(t=>tl[t]||t).join(', ')}</span></div><div class="bd-body">${ts.map(t=>{const b=d.types[t];return`<div class="bd-section"><h4>${esc(b.title)}</h4><p>${esc(b.summary||'').slice(0,250)}...</p>${b.markets?.length?`<div class="bd-markets">${b.markets.map(m=>esc(m)).join('<br>')}</div>`:''}</div>`}).join('')}</div></div>`;
  }).join('');
}

function renderArchitecture(main) {
  main.innerHTML = `<div class="main-header"><h2>System Architecture</h2><span class="header-date">3-Axis Design</span></div>
    <div class="arch-grid">
      <div class="arch-card foundation"><h3>Wiki</h3><p>Obsidian vault <code>2_Wiki/</code>, flat directory, ~340 pages. Long-term knowledge store: concepts, decisions, insights, project specs. Connected via prose relations. Auto-verified with 10-step wiki-verify checklist every Sunday.</p></div>
      <div class="arch-card foundation"><h3>Dashboard</h3><p><code>jsm0308.github.io/home/dashboard.html</code> — this page. Routine results, market data, system health in one view. Updated via <code>extract_*.py</code> scripts that pull from Wiki + CSV caches. Deploys to GitHub Pages on push.</p></div>
      <div class="arch-card foundation"><h3>Rules Engine</h3><p><code>.cursor/rules/</code> — 26 .mdc files defining Coach agent behavior. 15 always-on, 11 on-demand. Covers domains: Core, Wiki, Economy, Career, Study, Life, Design, Safety. Extracted to readable cards on this dashboard.</p></div>
    </div>
    <div class="card" style="margin-bottom:14px"><h3>Data Flow</h3>
      <div class="flow-row"><span class="flow-node">You (request)</span><span class="flow-arrow">&rarr;</span><span class="flow-node">Coach (DeepSeek v4 Pro)</span><span class="flow-arrow">&rarr;</span><span class="flow-node">WebSearch + Scripts</span></div>
      <div class="flow-row" style="margin-top:4px"><span class="flow-node" style="font-size:12px;border-color:var(--foundation)">Wiki (permanent)</span><span class="flow-node" style="font-size:12px;border-color:var(--operations)">Dashboard (web)</span><span class="flow-node" style="font-size:12px">Email (alert)</span></div>
    </div>
    <div class="card"><h3>Sunday Maintenance <span class="card-badge operations">weekly</span></h3>
      <div class="maint-item"><span class="maint-dot"></span><span class="maint-label">Rule Pruning</span><span class="maint-desc">Check if 15 always-on rules exceed limit. Propose deactivation for unused ones.</span></div>
      <div class="maint-item"><span class="maint-dot"></span><span class="maint-label">Adversarial Audit</span><span class="maint-desc">Sample-check wiki frontmatter, broken links, orphan pages. Verify system follows its own rules.</span></div>
      <div class="maint-item"><span class="maint-dot"></span><span class="maint-label">Skill Inventory</span><span class="maint-desc">Update version and status for all 9 active skills (crypto-bot, deep-research, etc).</span></div>
      <div class="maint-item"><span class="maint-dot"></span><span class="maint-label">Prompt Journal</span><span class="maint-desc">Analyze last week's prompts. Score clarity/structure/specificity. Suggest improvements.</span></div>
      <div class="maint-item"><span class="maint-dot"></span><span class="maint-label">Domain Cleanup</span><span class="maint-desc">Archive expired deadlines. Flag stale decisions. Never auto-delete.</span></div>
    </div>`;
}

function renderWikiView(main) {
  main.innerHTML = `<div class="main-header"><h2>Wiki Browser</h2><span class="header-date">${cachedWiki?.length||0} pages indexed</span></div>
    <input type="text" class="wiki-search" id="wikiSearch" placeholder="Search 340+ wiki pages..." oninput="renderWikiGrid()">
    <div class="filter-bar" id="wikiFilters"></div>
    <div id="wikiContainer"></div>`;
  buildWikiFilters(); renderWikiGrid();
}

function buildWikiFilters() {
  if(!cachedWiki)return; const domains=new Set(); cachedWiki.forEach(p=>domains.add(p.domain));
  const bar=document.getElementById('wikiFilters'); if(!bar)return;
  let h='<span class="flabel">Domain:</span>';
  h+=`<button class="fbtn active" onclick="fltWiki('All')">All (${cachedWiki.length})</button>`;
  [...domains].sort().forEach(d=>{const c=cachedWiki.filter(p=>p.domain===d).length;h+=`<button class="fbtn" onclick="fltWiki('${d}')">${d} (${c})</button>`;});
  bar.innerHTML=h;
}
function fltWiki(d){activeWikiDomain=d;document.querySelectorAll('#wikiFilters .fbtn').forEach(b=>b.classList.remove('active'));const btn=document.querySelector(`#wikiFilters .fbtn[onclick="fltWiki('${d}')"]`);if(btn)btn.classList.add('active');renderWikiGrid();}

function renderWikiGrid() {
  if(!cachedWiki)return;const q=(document.getElementById('wikiSearch')?.value||'').toLowerCase();
  let f=activeWikiDomain==='All'?cachedWiki:cachedWiki.filter(p=>p.domain===activeWikiDomain);
  if(q)f=f.filter(p=>(p.title||'').toLowerCase().includes(q)||(p.summary||'').toLowerCase().includes(q));
  const container=document.getElementById('wikiContainer');if(!container)return;
  const groups={};f.forEach(p=>{groups[p.domain]=groups[p.domain]||[];groups[p.domain].push(p);});
  let h='';for(const[d,pgs]of Object.entries(groups).sort()){h+=`<div class="wiki-group"><h3>${d} (${pgs.length})</h3>`;pgs.forEach(p=>{h+=`<div class="wiki-item"><span class="wi-title">${esc(p.slug)}</span><span class="wi-summary">${esc(p.summary||'')}</span><span class="wi-meta"><span class="badge muted">${p.kind||''}</span> ${p.updated||''}</span></div>`;});h+='</div>';}
  container.innerHTML=h||'<div class="empty-state"><div class="eicon">--</div>No matching pages</div>';
}

function renderRulesView(main) {
  main.innerHTML = `<div class="main-header"><h2>Rules Reference</h2><span class="header-date">${cachedRules?.length||0} .mdc files</span></div>
    <div class="filter-bar" id="ruleFilters"></div><div class="rule-grid" id="ruleGrid"></div>`;
  buildRuleFilters(); renderRuleGrid();
}

function buildRuleFilters() {
  if(!cachedRules)return;const domains=new Set();cachedRules.forEach(r=>(r.domain||[]).forEach(d=>domains.add(d)));
  const bar=document.getElementById('ruleFilters');if(!bar)return;
  let h='<span class="flabel">Domain:</span>';h+=`<button class="fbtn active" onclick="fltRules('All')">All (${cachedRules.length})</button>`;
  [...domains].sort().forEach(d=>{const c=cachedRules.filter(r=>(r.domain||[]).includes(d)).length;h+=`<button class="fbtn" onclick="fltRules('${d}')">${d} (${c})</button>`;});
  bar.innerHTML=h;
}
function fltRules(d){activeRuleDomain=d;document.querySelectorAll('#ruleFilters .fbtn').forEach(b=>b.classList.remove('active'));const btn=document.querySelector(`#ruleFilters .fbtn[onclick="fltRules('${d}')"]`);if(btn)btn.classList.add('active');renderRuleGrid();}

function renderRuleGrid() {
  if(!cachedRules)return;const f=activeRuleDomain==='All'?cachedRules:cachedRules.filter(r=>(r.domain||[]).includes(activeRuleDomain));
  const grid=document.getElementById('ruleGrid');if(!grid)return;
  grid.innerHTML=f.map((r,i)=>{const idx=cachedRules.indexOf(r);const bb=r.alwaysApply?'<span class="badge foundation">always</span>':'<span class="badge operations">on-demand</span>';const db=(r.domain||[]).slice(0,2).map(d=>`<span class="badge muted">${d}</span>`).join(' ');return`<div class="rule-card" onclick="openRuleModal(${idx})"><div class="rc-title">${esc(r.title)}</div><div class="rc-summary">${esc(r.summary||'')}</div><div class="rc-meta">${bb} ${db} <span style="font-size:10.5px;color:var(--text-tertiary)">${esc(r.file)}</span></div></div>`;}).join('');
}

function openRuleModal(idx){const r=cachedRules[idx];if(!r)return;let h=`<button class="modal-close" onclick="closeRuleModal()">x</button>`;h+=`<h3 style="font-size:17px;font-weight:700;margin-bottom:2px">${esc(r.title)}</h3>`;h+=`<p style="font-size:11.5px;color:var(--text-tertiary);margin-bottom:8px">${esc(r.file)} · ${r.alwaysApply?'<span class="badge foundation">always</span>':'<span class="badge operations">on-demand</span>'} ${(r.domain||[]).map(d=>`<span class="badge muted">${d}</span>`).join(' ')}</p>`;h+=`<p style="font-size:13px;color:var(--text-secondary);line-height:1.65">${esc(r.subtitle||'')}</p>`;if(r.sections?.length){r.sections.forEach(s=>{h+=`<div class="modal-section"><h4>${esc(s.heading)}</h4><p>${esc(s.body)}</p></div>`;});}document.getElementById('ruleModal').innerHTML=h;document.getElementById('ruleModalOverlay').classList.add('open');}
function closeRuleModal(){document.getElementById('ruleModalOverlay').classList.remove('open');}

function renderRoutinesView(main) {
  main.innerHTML = `<div class="main-header"><h2>Routines & Briefings</h2><span class="header-date">12 active routines</span></div>
    <div class="card accent-operations" style="margin-bottom:14px"><h3>Youth Policy + Kyung Hee Scan <span class="card-badge operations">Sun 10:30</span></h3><div id="policyList"></div></div>
    <div class="cards-grid" style="margin-bottom:14px">
      <div class="card"><h3>Daily Investment Briefing <span class="card-badge muted">Mon-Fri</span></h3><div id="dailyBriefing"></div></div>
      <div class="card"><h3>Weekly Investment Report <span class="card-badge muted">Sun</span></h3><div id="weeklyReport"></div></div>
      <div class="card"><h3>Prompt Journal Review <span class="card-badge muted">Sun</span></h3><div id="promptReview"></div></div>
    </div>
    <div class="card accent-foundation"><h3>Soonsal Briefings <span class="card-badge foundation">${cachedSoonsal?.length||0} days</span></h3><div id="soonsalList">${renderBriefingPreview()}</div></div>`;
  renderPolicyAsync(); renderInvestmentBriefings(); renderPromptReview();
}

async function renderPolicyAsync() {
  if(!cachedPolicy)cachedPolicy=await loadJSON('data/policy-scan.json');const el=document.getElementById('policyList');if(!el)return;const d=cachedPolicy;
  if(!d||!d.youthPolicies?.length&&!d.kyungheeBenefits?.length){el.innerHTML='<div class="empty-state"><div class="eicon">--</div>First scan scheduled Sunday</div>';return;}
  let h='';if(d.youthPolicies?.length){h+='<h4 style="font-size:12px;font-weight:600;margin:8px 0 4px">Government</h4>';d.youthPolicies.forEach(p=>{h+=`<div class="policy-item"><strong>${esc(p.title)}</strong><div class="pi-source">${esc(p.source)} ${p.deadline?'| Deadline: '+p.deadline:''}</div><p style="margin-top:2px;font-size:12px;color:var(--text-secondary)">${esc(p.summary)}</p>${p.link?`<a href="${p.link}" target="_blank">Link</a>`:''}</div>`;});}
  if(d.kyungheeBenefits?.length){h+='<h4 style="font-size:12px;font-weight:600;margin:8px 0 4px">Kyung Hee Univ</h4>';d.kyungheeBenefits.forEach(p=>{h+=`<div class="policy-item"><strong>${esc(p.title)}</strong><div class="pi-source">${esc(p.source)} ${p.deadline?'| Deadline: '+p.deadline:''}</div><p style="margin-top:2px;font-size:12px;color:var(--text-secondary)">${esc(p.summary)}</p>${p.link?`<a href="${p.link}" target="_blank">Link</a>`:''}</div>`;});}
  el.innerHTML=h;
}

function renderInvestmentBriefings() {
  if(!cachedInvestment){document.getElementById('dailyBriefing').innerHTML='<div class="empty-state"><div class="eicon">--</div>Waiting</div>';document.getElementById('weeklyReport').innerHTML='<div class="empty-state"><div class="eicon">--</div>Waiting</div>';return;}
  const di=cachedInvestment.investmentDaily;document.getElementById('dailyBriefing').innerHTML=di?.summary?`<p style="font-size:12px;color:var(--text-secondary)">${esc(di.summary)}</p><p style="font-size:11px;color:var(--text-tertiary);margin-top:4px">${di.date}</p>`:'<div class="empty-state"><div class="eicon">--</div>Pending</div>';
  const wi=cachedInvestment.investmentWeekly;document.getElementById('weeklyReport').innerHTML=wi?.summary?`<p style="font-size:12px;color:var(--text-secondary)">${esc(wi.summary)}</p><p style="font-size:11px;color:var(--text-tertiary);margin-top:4px">${wi.date}</p>`:'<div class="empty-state"><div class="eicon">--</div>Pending</div>';
}

function renderPromptReview() {
  if(!cachedHealth){document.getElementById('promptReview').innerHTML='<div class="empty-state"><div class="eicon">--</div>Waiting</div>';return;}
  const pj=cachedHealth.promptJournal;document.getElementById('promptReview').innerHTML=pj?.totalSessions>0?`<p>${pj.weekOf} · ${pj.totalSessions}sessions, ${pj.totalPrompts}prompts</p><p style="font-size:12px;color:var(--text-secondary);margin-top:2px">Avg score: <strong>${pj.avgScore}</strong></p><p style="font-size:12px;color:var(--text-secondary)">Focus: ${pj.focus}</p>`:'<div class="empty-state"><div class="eicon">--</div>Pending</div>';
}

function renderEconomyView(main) {
  const mk=cachedInvestment?.markets||{};let tickers='';
  if(mk.btc?.price){tickers=`<div class="ticker-grid"><div class="ticker-item"><span class="ticker-name">BTC (KRW)</span><span class="ticker-price">${(mk.btc.price/10000).toFixed(0)}<span style="font-size:11px;font-weight:400">만원</span></span><span class="ticker-date">${(mk.btc.date||'').slice(0,10)}</span></div><div class="ticker-item"><span class="ticker-name">S&P 500</span><span class="ticker-price">${mk.sp500?.price?.toLocaleString()||'--'}</span><span class="ticker-date">${(mk.sp500?.date||'').slice(0,10)}</span></div><div class="ticker-item"><span class="ticker-name">KOSPI</span><span class="ticker-price">${mk.kospi?.price?.toLocaleString()||'--'}</span><span class="ticker-date">${(mk.kospi?.date||'').slice(0,10)}</span></div><div class="ticker-item"><span class="ticker-name">NASDAQ</span><span class="ticker-price">${mk.nasdaq?.price?.toLocaleString()||'--'}</span><span class="ticker-date">${(mk.nasdaq?.date||'').slice(0,10)}</span></div></div>`;}
  main.innerHTML = `<div class="main-header"><h2>Investment</h2><span class="header-date">Portfolio + Market Data</span></div>${tickers}<div class="card accent-operations"><h3>Portfolio Snapshot</h3><div id="portfolioSnapshot"></div></div>`;
  const el=document.getElementById('portfolioSnapshot');const pf=cachedInvestment?.portfolio;
  if(!pf){el.innerHTML='<div class="empty-state"><div class="eicon">--</div>No data</div>';return;}
  el.innerHTML=`<p style="font-size:14px;margin-bottom:8px">Total: <strong>${(pf.totalValue/10000).toFixed(0)}만 KRW</strong> ${pf.needsRebalance?'<span class="badge data">Rebalance needed</span>':''}</p><table class="simple-table"><thead><tr><th>Asset</th><th>Amount</th><th>Target</th><th>Drift</th></tr></thead><tbody>${pf.allocations.map(a=>`<tr><td>${esc(a.asset)}</td><td>${(a.amount/10000).toFixed(0)}만 KRW</td><td>${a.target}</td><td>${a.drift}%</td></tr>`).join('')}</tbody></table>`;
}

function renderSystemView(main) {
  const sys=cachedHealth?.systemHealth||{};const wp=cachedWiki?.length||'?';const ar=cachedRules?.filter(r=>r.alwaysApply).length||'?';
  main.innerHTML = `<div class="main-header"><h2>System Health</h2><span class="header-date">Sunday auto-check</span></div>
    <div class="stat-row"><div class="stat accent"><div class="stat-value">${wp}</div><div class="stat-label">Wiki Pages</div></div><div class="stat"><div class="stat-value">9</div><div class="stat-label">Skills</div></div><div class="stat"><div class="stat-value">${ar}</div><div class="stat-label">Always-on Rules</div></div><div class="stat"><div class="stat-value"><span class="badge operations">Healthy</span></div><div class="stat-label">Status</div></div></div>
    <div class="card"><h3>Skill Inventory</h3><div id="skillInventory"></div></div>
    <div class="card" style="margin-top:14px"><h3>Adversarial Audit</h3><div id="auditResult"></div></div>`;
  if(sys?.skills)document.getElementById('skillInventory').innerHTML=`<table class="simple-table"><thead><tr><th>Skill</th><th>Ver</th><th>Status</th><th>Last Tested</th></tr></thead><tbody>${sys.skills.map(s=>`<tr><td><strong>${esc(s.name)}</strong></td><td>${s.version}</td><td><span class="badge ${s.status==='active'?'operations':'data'}">${s.status}</span></td><td>${s.lastTested}</td></tr>`).join('')}</tbody></table>`;
  document.getElementById('auditResult').innerHTML=sys?.lastAudit?`<p>Last: ${sys.lastAudit}</p><p>Orphans: ${sys.orphanPages}, Broken links: ${sys.brokenLinks}</p><p>Rules: ${sys.alwaysOnRules} always (target ${sys.targetMax})</p>`:'<div class="empty-state"><div class="eicon">--</div>First audit scheduled Sunday</div>';
}

async function loadJSON(path){try{const r=await fetch(path);if(!r.ok)throw new Error('HTTP '+r.status);return await r.json();}catch(e){console.error(path,e);return null;}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function init(){
  const[rules,wiki,inv,soonsal,health,policy]=await Promise.all([loadJSON('data/rules.json'),loadJSON('data/wiki-index.json'),loadJSON('data/investment.json'),loadJSON('data/soonsal-briefings.json'),loadJSON('data/system-health.json'),loadJSON('data/policy-scan.json')]);
  cachedRules=rules||[];cachedWiki=wiki||[];cachedInvestment=inv||{};cachedSoonsal=soonsal||[];cachedHealth=health||{};cachedPolicy=policy||{};
  renderView('overview');
}
init();
</script>
</body>
</html>
