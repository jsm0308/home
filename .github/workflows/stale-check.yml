name: Jeonse Data Maintenance

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 자정 UTC (KST 09:00)
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analyze data quality
        id: analyze
        run: |
          python3 -c "
          import json, os
          from datetime import datetime, timedelta

          with open('jeonse_data.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          listings = [l for l in data['listings'] if not l.get('area', '').endswith('_removed')]
          removed = [l for l in data['listings'] if l.get('area', '').endswith('_removed')]
          timestamp = data.get('timestamp', 'unknown')

          # Count link quality
          good_links = 0
          search_links = 0
          no_links = 0
          for l in listings:
              link = l.get('link', '')
              if not link or link == '-':
                  no_links += 1
              elif 'articleNo=' in link or '/detail/' in link:
                  good_links += 1
              else:
                  search_links += 1

          # Count stale listings (older than 90 days)
          stale = 0
          cutoff = (datetime.now() - timedelta(days=90)).strftime('%Y-%m-%d')
          for l in listings:
              date_str = l.get('date', '')
              if date_str and len(date_str) >= 10:
                  if date_str[:10] < cutoff:
                      stale += 1

          print(f'total={len(listings)}')
          print(f'removed={len(removed)}')
          print(f'good_links={good_links}')
          print(f'search_links={search_links}')
          print(f'no_links={no_links}')
          print(f'stale={stale}')
          print(f'last_update={timestamp}')
          " > $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          echo "## 자동 분석 리포트 - $(date '+%Y-%m-%d')" > changelog.md
          echo "" >> changelog.md
          echo "**마지막 업데이트**: ${{ steps.analyze.outputs.last_update }}" >> changelog.md
          echo "" >> changelog.md
          echo "| 항목 | 수치 |" >> changelog.md
          echo "|---|---|" >> changelog.md
          echo "| 전체 매물 | ${{ steps.analyze.outputs.total }} |" >> changelog.md
          echo "| 제거된 매물 | ${{ steps.analyze.outputs.removed }} |" >> changelog.md
          echo "| 실제 링크 | ${{ steps.analyze.outputs.good_links }} |" >> changelog.md
          echo "| 검색 링크 | ${{ steps.analyze.outputs.search_links }} |" >> changelog.md
          echo "| 링크 없음 | ${{ steps.analyze.outputs.no_links }} |" >> changelog.md
          echo "| 90일 이상 된 매물 | ${{ steps.analyze.outputs.stale }} |" >> changelog.md
          echo "" >> changelog.md
          echo "## 갱신 방법" >> changelog.md
          echo "1. Cursor IDE에서 \"전세 매물 업데이트 해줘\" 명령" >> changelog.md
          echo "2. [대시보드](https://jsm0308.github.io/home)에서 수동 추가" >> changelog.md
          echo "3. GitHub에서 직접 jeonse_data.json 수정" >> changelog.md

      - name: Create issue if data is stale
        if: steps.analyze.outputs.stale > 0
        uses: actions/github-script@v7
        with:
          script: |
            const stale = '${{ steps.analyze.outputs.stale }}';
            const lastUpdate = '${{ steps.analyze.outputs.last_update }}';

            // Close old stale-data issues
            const oldIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['stale-data'],
              state: 'open'
            });
            for (const issue of oldIssues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

            // Create new reminder
            const fs = require('fs');
            const changelog = fs.readFileSync('changelog.md', 'utf8');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `전세 매물 데이터 점검 - ${stale}건 90일 이상 경과`,
              body: changelog,
              labels: ['stale-data']
            });
